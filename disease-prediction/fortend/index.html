<!DOCTYPE html>
<html>
<head>
    <title>Disease Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h1>AI Disease Predictor </h1>

    <div class="grid">
        <input id="age" placeholder="Age">
        <input id="sex" placeholder="Sex (1/0)">
        <input id="cp" placeholder="Chest Pain">
        <input id="trestbps" placeholder="BP">
        <input id="chol" placeholder="Cholesterol">
        <input id="fbs" placeholder="Sugar">
        <input id="restecg" placeholder="ECG">
        <input id="thalach" placeholder="Heart Rate">
        <input id="exang" placeholder="Angina">
        <input id="oldpeak" placeholder="Oldpeak">
    </div>

    <button onclick="predict()">Predict</button>

    <div id="result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
